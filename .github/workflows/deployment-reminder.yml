name: Notify Pending Deployment

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment status and notify
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Pending deployment on main';
            const label = 'deployment-reminder';

            // Get current HEAD of main
            const branch = await github.rest.repos.getBranch({ owner, repo, branch: 'main' });
            const mainSha = branch.data.commit.sha;
            const mainUrl = branch.data.commit.url;

            // Get latest successful manual deploy run (hugo.yml workflow_dispatch)
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'hugo.yml',
              branch: 'main',
              event: 'workflow_dispatch',
              status: 'completed',
              per_page: 30,
            });

            const deployedRun = runs.data.workflow_runs.find(r => r.conclusion === 'success');
            const deployedSha = deployedRun ? deployedRun.head_sha : null;
            const deployedRunUrl = deployedRun ? deployedRun.html_url : null;

            const pending = deployedSha !== mainSha;

            // Ensure label exists (best effort)
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch {
              try {
                await github.rest.issues.createLabel({ owner, repo, name: label, color: 'FBCA04' });
              } catch (e) {
                core.warning(`Could not create label ${label}: ${e.message}`);
              }
            }

            const existingIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 20,
            });

            const existing = existingIssues.data.find(i => i.title === title);

            if (pending) {
              const body = [
                'There are commits on `main` that are not yet deployed to GitHub Pages.',
                '',
                `- Current main SHA: \`${mainSha}\``,
                `- Latest deployed SHA: ${deployedSha ? `\`${deployedSha}\`` : 'none yet'}`,
                `- Main commit API URL: ${mainUrl}`,
                `- Latest successful deploy run: ${deployedRunUrl ? deployedRunUrl : 'none yet'}`,
                '',
                'Run the manual deploy workflow at:',
                `https://github.com/${owner}/${repo}/actions/workflows/hugo.yml`,
              ].join('\n');

              if (!existing) {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                  labels: [label],
                });
                core.info(`Created reminder issue #${created.data.number}`);
              } else {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body,
                });
                core.info(`Updated reminder issue #${existing.number}`);
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: 'Deployment is up to date with `main`. Closing this reminder.',
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: 'closed',
              });
              core.info(`Closed reminder issue #${existing.number}`);
            } else {
              core.info('Deployment is up to date; no reminder needed.');
            }
