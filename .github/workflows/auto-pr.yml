name: Auto Open PR From pages-edits

on:
  push:
    branches:
      - pages-edits
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  ensure-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure pull request exists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:pages-edits`;
            const base = 'main';

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              core.info(`PR already open: #${existing.data[0].number}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: 'Review content changes',
              head: 'pages-edits',
              base,
              body: 'Automated pull request from `pages-edits` branch.\\n\\nReview changes and merge when ready.',
            });

            core.info(`Created PR #${created.data.number}`);

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: created.data.number,
                labels: ['content'],
              });
            } catch (error) {
              core.warning(`Could not add label: ${error.message}`);
            }
