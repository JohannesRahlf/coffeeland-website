{{ define "main" }}
<div class="article-page">
  <div class="container">
    {{ if eq .Section "news" }}
    <!-- News Article -->
    <article class="news-article">
      <header class="article-header">
        <h1>{{ .Title }}</h1>
        {{ if .Date }}<time class="article-date">{{ .Date.Format "January 2, 2006" }}</time>{{ end }}
        {{ if .Params.author }}<p class="article-author">By {{ .Params.author }}</p>{{ end }}
      </header>
      <div class="article-content">
        {{ .Content }}
      </div>
      <footer class="article-footer">
        <a href="/news/" class="back-link">← Back to all news</a>
      </footer>
    </article>
    {{ else }}
    <!-- Generic page -->
    <article>
      <h1>{{ .Title }}</h1>
      <div class="content">
        {{ .Content }}
      </div>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
