{{ define "main" }}
<div class="list-page">
  <h1>{{ .Title }}</h1>
  <div class="list-content">
    {{ if .Content }}
      {{ .Content }}
    {{ end }}
    
    {{ if .Pages }}
      <ul class="post-list">
        {{ range .Pages.ByDate.Reverse }}
          <li>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
            {{ if .Date }}<span class="date">{{ .Date.Format "January 2, 2006" }}</span>{{ end }}
          </li>
        {{ end }}
      </ul>
    {{ end }}
  </div>
</div>
{{ end }}
