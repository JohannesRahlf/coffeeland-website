baseURL = 'https://johannesrahlf.github.io/coffeeland-website/'
languageCode = 'en-us'
title = 'CoffeeLand'
theme = 'stack'
publishDir = 'docs'

[outputs]
  home = ['HTML', 'JSON']

[params]
  siteName = 'CoffeeLand'
  description = 'CoffeeLand is a community-driven initiative focused on sustainable coffee production and knowledge sharing.'
  
  [params.sidebar]
    enabled = true
    avatar = 'avatar.png'

  [params.article]
    math = false
    toc = true
    readingTime = true

  [params.comments]
    enabled = false

[pagination]
  pagerSize = 10

[taxonomies]
  tag = 'tags'
  category = 'categories'

